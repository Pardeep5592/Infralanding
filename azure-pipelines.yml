trigger:
  branches:
    include:
      - main
      - feature

pool:
  name: pardeeppooljuly

variables:
  # Infracost API key - isko pipeline secret variable ya variable group se lena, plain text mat rakhna
  INFRACOST_API_KEY: "ico-crAo3mJC3kRm7RoJF258WuLcT9q9yg5b"

stages:
  - stage: Terraform
    displayName: Terraform Plan & Cost Estimate
    jobs:
      - job: InfraCostJob
        displayName: Terraform Plan and Infracost
        steps:
          - checkout: self

          # ======================
          # TERRAFORM INIT
          # ======================
          - task: PowerShell@2
            displayName: Terraform Init
            inputs:
              targetType: inline
              workingDirectory: '$(System.DefaultWorkingDirectory)'
              script: |
                terraform init

          # ======================
          # TERRAFORM PLAN
          # ======================
          - task: PowerShell@2
            displayName: Terraform Plan
            inputs:
              targetType: inline
              workingDirectory: '$(System.DefaultWorkingDirectory)'
              script: |
                terraform plan -out=tfplan
                if (!(Test-Path tfplan)) {
                  Write-Error "tfplan not created"
                  exit 1
                }

          # ======================
          # CONVERT PLAN TO JSON
          # ======================
          - task: PowerShell@2
            displayName: Terraform Show (JSON)
            inputs:
              targetType: inline
              workingDirectory: '$(System.DefaultWorkingDirectory)'
              script: |
                terraform show -json tfplan > tfplan.json

          # ======================
          # INSTALL INFRACOST CLI
          # ======================
          - task: PowerShell@2
            displayName: Install Infracost CLI
            inputs:
              targetType: inline
              script: |
                iex "& {$(irm https://infracost.io/install.ps1)}"

          # ======================
          # RUN INFRACOST
          # ======================
          - task: PowerShell@2
            displayName: Run Infracost Breakdown
            inputs:
              targetType: inline
              workingDirectory: '$(System.DefaultWorkingDirectory)'
              script: |
                infracost breakdown --path tfplan.json --format table
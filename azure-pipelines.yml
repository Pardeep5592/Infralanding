trigger:
 branches:
   include:
     - main
     - feature 

pool: 
 name: pardeeppooljuly

stages:
  - stage: 
    jobs:
      - job: "Terraforminit"
        steps:
        - task: PowerShell@2
          inputs:
            targetType: 'inline'
            script: 'terraform init'
            # workingDirectory: 'system.DefaultWorkingDirectory'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'validate'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'plan'
            environmentServiceNameAzureRM: 'shashi'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'apply'
            environmentServiceNameAzureRM: 'shashi'
trigger:
 branches:
   include:
     - main
     - feature 

pool: 
 name: pardeeppooljuly

stages:
  - stage: 
    jobs:
      - job: "Terraforminit"
        steps:
        - task: PowerShell@2
          inputs:
            targetType: 'inline'
            script: 'terraform init'
            # workingDirectory: 'system.DefaultWorkingDirectory'
   
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'validate'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'plan'
            environmentServiceNameAzureRM: 'shashi'
        - task: InfracostSetup@2
          inputs:
            apiKey: 'ico-crAo3mJC3kRm7RoJF258WuLcT9q9yg5b'
            version: '0.10.x'

trigger:
  branches:
    include:
      - main
      - feature

pool:
  name: pardeeppooljuly

variables:
  # Infracost API key - isko pipeline secret variable ya variable group se lena, plain text mat rakhna
  INFRACOST_API_KEY: "ico-crAo3mJC3kRm7RoJF258WuLcT9q9yg5b"

stages:
  - stage: Terraform
    displayName: Terraform Plan & Cost Estimate
    jobs:
      - job: InfraCostJob
        displayName: Terraform Plan and Infracost
        steps:
          - checkout: self

          # ======================
          # TERRAFORM INIT
          # ======================
          - task: PowerShell@2
            displayName: Terraform Init
            inputs:
              targetType: inline
              workingDirectory: '$(System.DefaultWorkingDirectory)'
              script: |
                terraform init

          # ======================
          # TERRAFORM PLAN
          # ======================
          - task: PowerShell@2
            displayName: Terraform Plan
            inputs:
              targetType: inline
              workingDirectory: '$(System.DefaultWorkingDirectory)'
              script: |
                terraform plan -out=tfplan
                if (!(Test-Path tfplan)) {
                  Write-Error "tfplan not created"
                  exit 1
                }

          # ======================
          # CONVERT PLAN TO JSON
          # ======================
          
          # ======================
          # INSTALL INFRACOST CLI
          # ======================
          - task: InfracostSetup@2
            inputs:
              apiKey: 'ico-crAo3mJC3kRm7RoJF258WuLcT9q9yg5b'
              version: '0.10.x'
          # ======================
          # RUN INFRACOST
          # ======================
         # ======================
          # CONVERT PLAN TO JSON
          # ======================
          - task: PowerShell@2
            displayName: Terraform Show (JSON)
            inputs:
              targetType: inline
              workingDirectory: '$(System.DefaultWorkingDirectory)'
              script: |
                terraform show -json tfplan | Out-File -FilePath tfplan.json -Encoding utf8 -NoNewline

          # ======================
          # VERIFY JSON FILE (debug step, zaroori nahi lekin recommended)
          # ======================
          - task: PowerShell@2
            displayName: Verify tfplan.json
            inputs:
              targetType: inline
              workingDirectory: '$(System.DefaultWorkingDirectory)'
              script: |
                if (!(Test-Path tfplan.json)) {
                  Write-Error "tfplan.json not found"
                  exit 1
                }
                $size = (Get-Item tfplan.json).Length
                Write-Host "tfplan.json size: $size bytes"
                Get-Content tfplan.json -TotalCount 5

          # ======================
          # RUN INFRACOST
          # ======================
        # ======================
          # TERRAFORM SHOW + INFRACOST (SAME STEP)
          # ======================
          - task: PowerShell@2
            displayName: Terraform Show + Infracost Breakdown
            inputs:
              targetType: inline
              workingDirectory: '$(System.DefaultWorkingDirectory)'
              script: |
                $planJson = "$(System.DefaultWorkingDirectory)\tfplan.json"

                terraform show -json tfplan | Out-File -FilePath $planJson -Encoding utf8 -NoNewline

                if (!(Test-Path $planJson)) {
                  Write-Error "tfplan.json not created"
                  exit 1
                }
                Write-Host "tfplan.json size: $((Get-Item $planJson).Length) bytes"

                infracost breakdown --path $planJson --format table
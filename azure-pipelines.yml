trigger:
  branches:
    include:
      - main
      - feature

pool:
  name: pardeeppooljuly

stages:
- stage: Terraform
  jobs:
  - job: TerraformInit

    steps:

    - task: PowerShell@2
      displayName: Terraform Init
      inputs:
        targetType: inline
        script: |
          terraform init

    - task: TerraformTask@5
      displayName: Terraform Validate
      inputs:
        provider: azurerm
        command: validate

    - task: TerraformTask@5
      displayName: Terraform Plan
      inputs:
        provider: azurerm
        command: plan
        environmentServiceNameAzureRM: shashi

    - task: InfracostSetup@2
      displayName: Install Infracost
      inputs:
        apiKey: $(INFRACOST_API_KEY)
        version: '0.10.x'

    - task: PowerShell@2
      displayName: Generate Terraform JSON Plan
      inputs:
        targetType: inline
        script: |
          terraform show -json tfplan > plan.json

    - task: PowerShell@2
      displayName: Infracost Breakdown
      inputs:
        targetType: inline
        script: |
          infracost breakdown --path plan.json --format table